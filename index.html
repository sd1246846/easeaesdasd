<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPaste // Modern Text Sharing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Inter:wght@300;400;600&display=swap');
        
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #484f58; }

        .editor-container {
            height: calc(100vh - 64px);
            display: flex;
        }

        .line-numbers {
            width: 50px;
            padding: 20px 0;
            text-align: center;
            background-color: #0d1117;
            border-right: 1px solid #30363d;
            color: #484f58;
            font-size: 14px;
            user-select: none;
            overflow: hidden;
        }

        #main-textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e6edf3;
            padding: 20px;
            font-size: 15px;
            line-height: 1.6;
            resize: none;
        }

        .glass-nav {
            background: rgba(22, 27, 34, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #30363d;
        }

        .btn-primary {
            background: #238636;
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) { background: #2ea043; transform: translateY(-1px); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            background: #21262d;
            border: 1px solid #30363d;
            transition: all 0.2s;
        }
        .btn-secondary:hover:not(:disabled) { background: #30363d; border-color: #8b949e; }
        .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

        #raw-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d1117;
            z-index: 9999;
            padding: 20px;
            overflow-y: auto;
            color: #e6edf3;
            white-space: pre-wrap;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
        }

        #raw-back-btn {
            position: fixed;
            top: 20px;
            right: 40px;
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: sans-serif;
            font-size: 12px;
            border: 1px solid #30363d;
        }
    </style>
</head>
<body>

    <nav class="h-16 flex items-center justify-between px-6 glass-nav relative z-10">
        <div class="flex items-center space-x-3 cursor-pointer" onclick="window.location.search = ''">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-file-code text-white"></i>
            </div>
            <h1 class="text-xl font-semibold tracking-tight text-white">Quick<span class="text-blue-500">Paste</span></h1>
        </div>

        <div id="nav-actions" class="flex items-center space-x-3">
            <button id="raw-link-btn" style="display:none;" onclick="copyRawLink()" class="btn-secondary text-sm px-4 py-2 rounded-md flex items-center space-x-2">
                <i class="fas fa-link"></i>
                <span>Raw Link</span>
            </button>
            <button id="share-link-btn" style="display:none;" onclick="copyShareLink()" class="btn-secondary text-sm px-4 py-2 rounded-md flex items-center space-x-2">
                <i class="far fa-copy"></i>
                <span>Copy Share Link</span>
            </button>
            <button onclick="toggleRaw()" class="btn-secondary text-sm px-4 py-2 rounded-md flex items-center space-x-2">
                <i class="fas fa-terminal"></i>
                <span>View Raw</span>
            </button>
            <button id="save-btn" onclick="saveToCloud()" class="btn-primary text-sm px-4 py-2 rounded-md font-medium text-white flex items-center space-x-2">
                <i class="fas fa-cloud-upload-alt"></i>
                <span>Save Paste</span>
            </button>
        </div>
    </nav>

    <main class="editor-container">
        <div id="line-numbers" class="line-numbers mono">1</div>
        <textarea id="main-textarea" class="mono" placeholder="// Paste your content here..." spellcheck="false" oninput="updateLineNumbers()"></textarea>
    </main>

    <div id="raw-overlay"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'quickpaste-v1';

        const textarea = document.getElementById('main-textarea');
        const lineNumbers = document.getElementById('line-numbers');
        const rawOverlay = document.getElementById('raw-overlay');
        const saveBtn = document.getElementById('save-btn');

        let user = null;
        let currentPasteId = null;

        // Auth
        const initAuth = async () => {
            await signInAnonymously(auth);
        };
        initAuth();
        onAuthStateChanged(auth, (u) => { 
            user = u; 
            handleInitialLoad();
        });

        async function handleInitialLoad() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const mode = params.get('mode');

            if (id) {
                currentPasteId = id;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pastes', id);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        textarea.value = data.content;
                        updateLineNumbers();
                        
                        document.getElementById('raw-link-btn').style.display = 'flex';
                        document.getElementById('share-link-btn').style.display = 'flex';

                        if (mode === 'raw') {
                            showRaw(data.content);
                        }
                    } else {
                        alert("Paste not found.");
                    }
                } catch (e) {
                    console.error("Error loading paste:", e);
                }
            }
        }

        window.saveToCloud = async () => {
            if (!user || !textarea.value.trim()) return;
            
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> <span>Saving...</span>';

            const id = Math.random().toString(36).substring(2, 10);
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'pastes', id), {
                    content: textarea.value,
                    createdAt: Date.now(),
                    userId: user.uid
                });

                const newUrl = window.location.origin + window.location.pathname + '?id=' + id;
                window.history.pushState({id}, '', newUrl);
                currentPasteId = id;
                
                document.getElementById('raw-link-btn').style.display = 'flex';
                document.getElementById('share-link-btn').style.display = 'flex';
                
                saveBtn.innerHTML = '<i class="fas fa-check"></i> <span>Saved!</span>';
                setTimeout(() => {
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> <span>Save Paste</span>';
                }, 2000);
            } catch (e) {
                console.error("Error saving:", e);
                saveBtn.disabled = false;
                saveBtn.innerHTML = 'Error!';
            }
        };

        window.updateLineNumbers = () => {
            const lines = textarea.value.split('\n').length;
            let lineContent = '';
            for (let i = 1; i <= lines; i++) {
                lineContent += i + '<br>';
            }
            lineNumbers.innerHTML = lineContent;
        };

        window.toggleRaw = () => {
            showRaw(textarea.value);
        };

        function showRaw(content) {
            rawOverlay.innerText = content;
            rawOverlay.style.display = 'block';
            
            const backBtn = document.createElement('div');
            backBtn.id = 'raw-back-btn';
            backBtn.innerHTML = '← Back to Editor';
            backBtn.onclick = () => {
                rawOverlay.style.display = 'none';
                if (currentPasteId) {
                    const cleanUrl = window.location.origin + window.location.pathname + '?id=' + currentPasteId;
                    window.history.pushState({}, '', cleanUrl);
                }
            };
            rawOverlay.appendChild(backBtn);
        }

        window.copyRawLink = () => {
            if (!currentPasteId) return;
            const url = window.location.origin + window.location.pathname + '?id=' + currentPasteId + '&mode=raw';
            copyText(url, "Raw link copied!");
        };

        window.copyShareLink = () => {
            copyText(window.location.href, "Share link copied!");
        };

        function copyText(text, msg) {
            const dummy = document.createElement('textarea');
            document.body.appendChild(dummy);
            dummy.value = text;
            dummy.select();
            document.execCommand('copy');
            document.body.removeChild(dummy);
            alert(msg);
        }

        textarea.addEventListener('scroll', () => {
            lineNumbers.scrollTop = textarea.scrollTop;
        });
    </script>
</body>
</html>
